# /etc/nginx/sites-available/gastubos
# Configuración Nginx para VPS Linux
# Reemplazar TU_DOMINIO.com con tu dominio real

server {
    listen 80;
    server_name TU_DOMINIO.com www.TU_DOMINIO.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name TU_DOMINIO.com www.TU_DOMINIO.com;

    # SSL (certbot los genera automáticamente)
    ssl_certificate     /etc/letsencrypt/live/TU_DOMINIO.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/TU_DOMINIO.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Frontend (archivos estáticos del build de React)
    root /var/www/gastubos/frontend/dist;
    index index.html;

    # SPA: todas las rutas que no sean /api o /tubos van al index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API backend (Node.js corriendo en puerto 3001)
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Ruta pública de tubos (para QR sin auth)
    location /tubos/ {
        # Primero intenta el frontend (React maneja /tubos/:id)
        try_files $uri /index.html;
    }

    # Seguridad básica
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header X-XSS-Protection "1; mode=block";

    # Caché para assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
